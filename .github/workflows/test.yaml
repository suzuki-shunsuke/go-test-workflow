---
name: Test Go
on:
  workflow_call:
    inputs:
      aqua_policy_config:
        required: false
        type: string
      aqua_policy_allow:
        required: false
        type: string
      aqua_version:
        required: true
        type: string
      go-version:
        required: false
        type: string
      go-version-file:
        required: false
        type: string
      golangci-lint-timeout:
        required: false
        type: string
    secrets:
      TAKUMI_GUARD_BOT_ID:
        required: false

permissions: {}

env:
  AQUA_POLICY_CONFIG: ${{inputs.aqua_policy_config}}
  AQUA_LOG_COLOR: always

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # To update pull requests by reviewdog
      contents: read # To checkout private repository
      id-token: write
    steps:
      - run: |
          echo "::error:: Either go-version or go-version-file must be set."
          exit 1
        if: inputs.go-version == '' && inputs.go-version-file == ''
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{inputs.go-version}}
          go-version-file: ${{inputs.go-version-file}}
          cache: true

      - uses: flatt-security/setup-takumi-guard-golang@2e3c7c40b538cd68b2ac483def12982ebc8bc02e # v1
        with:
          bot-id: ${{secrets.TAKUMI_GUARD_BOT_ID}}

      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: ${{inputs.aqua_version}}
          policy_allow: ${{inputs.aqua_policy_allow}}

      - env:
          GITHUB_TOKEN: ${{github.token}}
        run: |
          if [ -f .goreleaser.yml ] || [ -f .goreleaser.yaml ];then
            goreleaser check
          fi

      - env:
          AQUA_GITHUB_TOKEN: ${{github.token}}
        run: golangci-lint version

      - env:
          AQUA_GITHUB_TOKEN: ${{github.token}}
        run: go-licenses --help
      - run: go-licenses check --disallowed_types=forbidden,restricted,unknown ./...

      - uses: suzuki-shunsuke/github-action-golangci-lint@9ec42b6334deb9b6e0a92372eba2dfbb333062e1 # v0.1.5
        if: |
          github.event_name != 'pull_request' || ! github.event.pull_request.head.repo.fork
        with:
          timeout: ${{inputs.golangci-lint-timeout}}

      - run: |
          if [ -n "$INPUT_TIMEOUT" ]; then
            golangci-lint run --timeout "$INPUT_TIMEOUT"
          else
            golangci-lint run
          fi
        if: |
          github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        env:
          INPUT_TIMEOUT: ${{inputs.golangci-lint-timeout}}

      - run: go test -v ./... -race -covermode=atomic
